<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SIer 1年目のための、寄り道できるIT学習マガジン"
    />
    <title>YORIMICHI.dev | 寄り道できるIT学習帳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500;600&family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <button class="brand" data-route="home" aria-label="ホームへ">
          <span class="brand-mark" aria-hidden="true">
            <span class="brand-route route-left"></span>
            <span class="brand-route route-right"></span>
            <span class="brand-route route-main"></span>
            <i></i>
          </span>
          <span>
            <strong>YORIMICHI.dev</strong>
            <small>寄り道できるIT学習帳</small>
          </span>
        </button>
        <nav class="main-nav" aria-label="メインナビゲーション">
          <button class="nav-link active" data-route="home">ホーム</button>
          <button class="nav-link" data-route="library">キーワード図鑑</button>
          <button class="nav-link" data-route="weekly">週刊トピック</button>
          <button class="nav-link" data-route="desk">学習デスク</button>
          <button class="nav-link" data-route="admin">管理</button>
        </nav>
        <button class="mobile-menu" aria-label="メニューを開く">MENU</button>
      </header>

      <main id="app"></main>

      <footer>
        <div>
          <strong>YORIMICHI.dev</strong>
          <p>わからないを、ちょっと面白いに。</p>
        </div>
        <p class="footer-note">FOR ROOKIE ENGINEERS · BUILT WITH CURIOSITY</p>
      </footer>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <dialog id="delete-dialog" class="confirm-dialog" aria-labelledby="delete-dialog-title">
      <div class="confirm-mark" aria-hidden="true">!</div>
      <p class="category-label">CONFIRM DELETE</p>
      <h2 id="delete-dialog-title">削除してもよいですか？</h2>
      <p id="delete-dialog-message">この操作は元に戻せません。</p>
      <div class="confirm-actions">
        <button id="cancel-delete" class="secondary-btn" type="button">キャンセル</button>
        <button id="confirm-delete" class="danger-btn" type="button">削除する</button>
      </div>
    </dialog>
    <script src="./app.js"></script>
  </body>
</html>
